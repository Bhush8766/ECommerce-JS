<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; }
.container { margin-top:40px; }
.card { border-radius:10px; }
.qty-btn {
    width:35px;
    height:35px;
    border:none;
    background:#0d6efd;
    color:white;
    font-size:18px;
    border-radius:5px;
}
.qty-btn:hover { background:#0b5ed7; }
</style>
</head>

<body>

<div class="container">

    <h2 class="mb-4">🛒 My Cart</h2>

    <div id="cartItems" class="row"></div>

    <div class="mt-4">
        <h4>Total Price: ₹ <span id="totalPrice">0</span></h4>
    </div>

    <div class="mt-3">
        <button class="btn btn-success" onclick="checkout()">Checkout</button>
        <a href="index.html" class="btn btn-secondary">Back</a>
    </div>

</div>

<script>

// ================= STORAGE =================
function getCartFromLocal(){
    let data = localStorage.getItem('Cart81')
    return (!data || data === "undefined") ? [] : JSON.parse(data)
}

function saveCartToLocal(c){
    localStorage.setItem('Cart81', JSON.stringify(c))
}

// ================= ELEMENTS =================
const cartItemsElmt = document.getElementById("cartItems")
const totalPriceElmt = document.getElementById("totalPrice")

// ================= RENDER =================
function renderCart(){

    let cartData = getCartFromLocal()

    if(cartData.length === 0){
        cartItemsElmt.innerHTML = "<h5>Cart is Empty</h5>"
        totalPriceElmt.textContent = 0
        return
    }

    let total = 0

    cartItemsElmt.innerHTML = cartData.map(item => {

        let itemTotal = item.product_price * item.quantity_inCart
        total += itemTotal

        return `
        <div class="col-12 col-md-6 col-lg-4 mb-3">
            <div class="card p-3 shadow-sm">

                <h5>${item.product_name}</h5>
                <p>Price: ₹${item.product_price}</p>

                <!-- Quantity Controls -->
                <div class="d-flex align-items-center mb-2">
                    <button class="qty-btn" onclick="decreaseQty(${item.product_id})">-</button>
                    <span class="mx-3">${item.quantity_inCart}</span>
                    <button class="qty-btn" onclick="increaseQty(${item.product_id})">+</button>
                </div>

                <p><b>Total: ₹${itemTotal}</b></p>

                <button class="btn btn-danger" onclick="removeFromCart(${item.product_id})">
                    Remove
                </button>

            </div>
        </div>
        `
    }).join("")

    totalPriceElmt.textContent = total
}

// ================= INCREASE =================
function increaseQty(id){

    let cart = getCartFromLocal()

    let item = cart.find(p => p.product_id == id)

    if(item){
        item.quantity_inCart++
    }

    saveCartToLocal(cart)
    renderCart()
}

// ================= DECREASE =================
function decreaseQty(id){

    let cart = getCartFromLocal()

    let index = cart.findIndex(p => p.product_id == id)

    if(index !== -1){

        if(cart[index].quantity_inCart > 1){
            cart[index].quantity_inCart--
        } else {
            // remove if quantity = 1
            cart.splice(index,1)
        }
    }

    saveCartToLocal(cart)
    renderCart()
}

// ================= REMOVE =================
function removeFromCart(id){

    let cart = getCartFromLocal()

    cart = cart.filter(item => item.product_id != id)

    saveCartToLocal(cart)
    renderCart()
}

// ================= CHECKOUT =================
function checkout(){

    let cart = getCartFromLocal()

    if(cart.length === 0){
        alert("Cart is empty")
        return
    }

    alert("🎉 Order Placed Successfully!")

    saveCartToLocal([])
    renderCart()
}

// ================= LOAD =================
window.addEventListener("DOMContentLoaded", renderCart)

</script>

</body>
</html>

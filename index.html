<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini E-Commerce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>🛍️ Product Store</h2>

    <!-- Search + Filter -->
    <input type="text" id="searchInput" class="form-control my-2" placeholder="Search..." onkeyup="searchProducts()">

    <select id="filterCategory" class="form-select mb-3" onchange="filterProducts()">
        <option value="">All</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Food">Food</option>
    </select>

    <!-- Cart -->
    <a href="cart.html" class="btn btn-warning mb-3">
        Cart (<span id="cartLength">0</span>)
    </a>

    <!-- Add Button -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addProduct">
        Add Product
    </button>

    <!-- Products -->
    <div id="renderProducts" class="row"></div>

</div>


<!-- MODAL -->
<div class="modal fade" id="addProduct">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-body">

<input id="title" class="form-control mb-2" placeholder="Title">
<input id="description" class="form-control mb-2" placeholder="Description">

<select id="category" class="form-control mb-2">
<option>Electronics</option>
<option>Clothing</option>
<option>Food</option>
</select>

<input id="brand" class="form-control mb-2" placeholder="Brand">
<input id="price" class="form-control mb-2" type="number" placeholder="Price">
<input id="quantity" class="form-control mb-2" type="number" placeholder="Quantity">

<button class="btn btn-success" onclick="AddNewProduct()">Add</button>

</div>

</div>
</div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
